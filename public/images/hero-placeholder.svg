<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Placeholder for a hero photograph">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#f6dcb8"/>
      <stop offset="0.45" stop-color="#e7a87f"/>
      <stop offset="1" stop-color="#c26b4b"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#fff4e2"/>
      <stop offset="0.55" stop-color="#fbdcae" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fbdcae" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="800" height="1000" fill="url(#sky)"/>
  <rect width="800" height="1000" fill="url(#sun)"/>

  <!-- rolling hills -->
  <path d="M0 760 C 180 700 280 770 420 740 S 680 690 800 730 L800 1000 L0 1000 Z" fill="#a4502f" opacity="0.35"/>
  <path d="M0 830 C 150 790 320 850 480 820 S 700 800 800 835 L800 1000 L0 1000 Z" fill="#7c3a22" opacity="0.4"/>

  <!-- sun disc -->
  <circle cx="400" cy="420" r="118" fill="#fff1da" opacity="0.92" filter="url(#soft)"/>
  <circle cx="400" cy="420" r="96" fill="none" stroke="#fff6ea" stroke-width="2" opacity="0.7"/>

  <!-- aperture blades, a nod to the camera -->
  <g transform="translate(400 420)" stroke="#c26b4b" stroke-width="2.5" fill="none" opacity="0.5">
    <polygon points="0,-70 60,-35 60,35 0,70 -60,35 -60,-35"/>
    <polygon points="0,-70 60,-35 0,0" opacity="0.35" fill="#a4502f" stroke="none"/>
    <polygon points="60,-35 60,35 0,0" opacity="0.25" fill="#a4502f" stroke="none"/>
    <polygon points="60,35 0,70 0,0" opacity="0.4" fill="#a4502f" stroke="none"/>
    <polygon points="0,70 -60,35 0,0" opacity="0.3" fill="#a4502f" stroke="none"/>
    <polygon points="-60,35 -60,-35 0,0" opacity="0.45" fill="#a4502f" stroke="none"/>
    <polygon points="-60,-35 0,-70 0,0" opacity="0.28" fill="#a4502f" stroke="none"/>
  </g>

  <!-- gentle birds -->
  <g stroke="#5a2a18" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M150 300 q 14 -12 28 0 q 14 -12 28 0"/>
    <path d="M250 250 q 11 -9 22 0 q 11 -9 22 0"/>
  </g>

  <text x="400" y="930" text-anchor="middle"
        font-family="Georgia, serif" font-size="26" fill="#fff" opacity="0.78"
        letter-spacing="1">her photograph goes here</text>
</svg>
